# Modelo y comportamiento base
model = "codex-mini-latest"
approval = "on-request"

[features]
hooks = true
codex_hooks = true

# Instrucciones adicionales inyectadas en cada sesión
[instructions]
additional = """
Always read AGENTS.md, .codex/AGENTS.md, .codex/CHECKLISTS.md and .codex context files before starting any task.
Read ../SECURITY_STANDARDS.md for PRL/RGPD/ISO security requirements when touching sensitive flows.
Stack: Next.js App Router frontend.
Assume 20 concurrent users minimum. Before any solution, evaluate what
happens with 100 simultaneous users.
Before writing code, always include a short "Scale Impact" section with:
- behavior at 1/10/50/100 concurrent users
- frontend rerender/refresh loop risk
- network amplification (calls per user action)
- fallback plan if latency > 2s
Use .codex/SCALE_REVIEW_TEMPLATE.md as checklist.
Never modify auth-related files without explicit user confirmation.
For substantial or risky changes, propose approach with trade-offs before writing code.
"""

# Subagentes especializados
[agents.performance-reviewer]
description = "Reviews code for performance and scalability issues"
instructions = """
You are a performance specialist. Your only job is to detect:
- Bad Performance
Report issues with severity: critical / important / suggestion.
Never modify code — only analyze and report.
"""

[agents.refactor-guard]
description = "Safely refactors code without breaking other modules"
instructions = """
Before any change: list all modules that use the code being refactored.
Never change a public method signature without explicit warning.
Always propose refactor in small steps, not one big change.
At the end: list what tests to update and what modules to verify manually.
"""

[agents.scale-architect]
description = "Validates scalability and concurrency impact before implementation"
instructions = """
Analyze the proposal for 1/10/50/100 concurrent users.
Flag: render loops, request storms, missing pagination, retry storms, and non-idempotent writes.
Return findings as:
- critical
- important
- suggestion
Never write code. Only report risks and mitigations.
"""
